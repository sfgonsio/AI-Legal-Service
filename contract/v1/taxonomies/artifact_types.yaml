taxonomy_name: artifact_types
version: v1
status: active

description: >
  Defines the initial governed artifact catalog for the AI Legal Service platform.
  These artifacts are the primary attorney-facing outputs supported in v1.

artifacts:

  - artifact_type_id: fact_matrix
    artifact_name: Fact Matrix
    artifact_class: governed_core
    pipeline_lane: assembly
    producer_type: deterministic_program
    primary_generator: program_FACT_NORMALIZATION
    lifecycle_policy: governed_review_required
    regeneration_policy: allowed_if_not_attorney_edited
    lineage_required: true
    trigger:
      event: fact_normalization_complete
      source: program_FACT_NORMALIZATION

  - artifact_type_id: master_timeline
    artifact_name: Master Timeline
    artifact_class: governed_core
    pipeline_lane: assembly
    producer_type: deterministic_program
    primary_generator: program_COMPOSITE_ENGINE
    lifecycle_policy: governed_review_required
    regeneration_policy: allowed_if_not_attorney_edited
    lineage_required: true
    trigger:
      event: event_candidates_confirmed
      source: program_COMPOSITE_ENGINE

  - artifact_type_id: element_proof_chart
    artifact_name: Element Proof Chart
    artifact_class: governed_core
    pipeline_lane: assembly
    producer_type: deterministic_program
    primary_generator: program_COA_ENGINE
    lifecycle_policy: governed_review_required
    regeneration_policy: allowed_if_not_attorney_edited
    lineage_required: true
    trigger:
      event: coa_selected
      source: program_COA_ENGINE

  - artifact_type_id: case_theory_memo
    artifact_name: Case Theory Memo
    artifact_class: governed_core
    pipeline_lane: proposal
    producer_type: ai_agent
    primary_generator: agent_COA_REASONER
    lifecycle_policy: governed_review_required
    regeneration_policy: allowed_if_not_attorney_edited
    lineage_required: true
    trigger:
      event: element_analysis_complete
      source: program_COA_ENGINE

  - artifact_type_id: complaint_draft
    artifact_name: Complaint Draft
    artifact_class: governed_core
    pipeline_lane: assembly
    producer_type: hybrid_workflow
    primary_generator: pleading_pipeline_v1
    lifecycle_policy: attorney_approval_required
    regeneration_policy: blocked_if_attorney_edited_without_approval
    lineage_required: true
    trigger:
      event: case_theory_approved
      source: agent_COA_REASONER

  - artifact_type_id: discovery_request_set
    artifact_name: Discovery Request Set
    artifact_class: governed_core
    pipeline_lane: assembly
    producer_type: hybrid_workflow
    primary_generator: discovery_pipeline_v1
    lifecycle_policy: attorney_approval_required
    regeneration_policy: blocked_if_attorney_edited_without_approval
    lineage_required: true
    trigger:
      event: proof_gap_detected
      source: program_COA_ENGINE

  - artifact_type_id: deposition_outline
    artifact_name: Deposition Outline
    artifact_class: governed_core
    pipeline_lane: assembly
    producer_type: hybrid_workflow
    primary_generator: deposition_pipeline_v1
    lifecycle_policy: attorney_approval_required
    regeneration_policy: blocked_if_attorney_edited_without_approval
    lineage_required: true
    trigger:
      event: deposition_target_selected
      source: case_workflow_controller

  - artifact_type_id: motion_draft
    artifact_name: Motion Draft
    artifact_class: governed_core
    pipeline_lane: assembly
    producer_type: future_capability
    primary_generator: reserved_motion_pipeline
    lifecycle_policy: attorney_approval_required
    regeneration_policy: blocked_if_attorney_edited_without_approval
    lineage_required: true
    trigger:
      event: motion_opportunity_detected
      source: program_COA_ENGINE

artifact_class_enforcement:
  governed_core_must_exist_in_registry: true
  lineage_required_for_governed_core: true
  attorney_release_required_for_external_use: true

producer_type_notes:
  deterministic_program: preferred_when_output_is_structured_and_repeatable
  ai_agent: used_when_reasoning_or_narrative_generation_is_required
  hybrid_workflow: combines_program_output_with_agent_or_template_driven_assembly
  future_capability: reserved_for_later_implementation_without_committing_to_new_agent_now