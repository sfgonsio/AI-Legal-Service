version: v1
jurisdiction: CA

# NOTE: CACI entries in this catalog are DEMOTED to provisional.
# They are NOT canonical certified authority.
# Element data is the cached payload of the active provisional record.
# Source-of-truth is the record file at `source_ref`.
# Brain must not read this catalog directly for CACI — it must go through the
# authority resolver (see contract/v1/brain/case_authority_resolution.md).

authority_catalog:

  CACI_303:
    title: "Breach of Contract – Essential Elements"
    status: PROVISIONAL
    canonical: false
    source_ref: authority_packs/ca_caci_provisional/records/CACI_303.yaml
