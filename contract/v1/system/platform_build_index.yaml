version: v1
authority: contract_v1_ssot
name: platform_build_index

platform_components:

  agents:
    - contract/v1/agents/agent_INTERVIEW_AGENT.md
    - contract/v1/agents/agent_MAPPING_AGENT.md
    - contract/v1/agents/agent_COA_REASONER.md
    - contract/v1/agents/OPPOSITION_AGENT.md

  programs:
  - contract/v1/programs/program_COMPLAINT_PARSE.md
  - contract/v1/programs/program_FACT_NORMALIZATION.md
  - contract/v1/programs/program_DISCOVERY_PACKET.md

  - contract/v1/programs/program_COMPOSITE_ENGINE.md
  - contract/v1/programs/program_TAGGING_ENGINE.md
  - contract/v1/programs/program_COA_ENGINE.md

  - contract/v1/programs/program_COVERAGE_ANALYSIS.md
  - contract/v1/programs/program_BURDEN_MAP_BUILDER.md
  - contract/v1/programs/program_MTC_READINESS_EVALUATOR.md
  - contract/v1/programs/program_AUTHORITY_COVERAGE_CHECK.md
  - contract/v1/programs/program_ARCHETYPE_PROPOSAL.md

  - contract/v1/programs/program_KNOWLEDGE_INGESTION.md
  - contract/v1/programs/program_RESEARCH_CAPTURE.md
  - contract/v1/programs/program_PATTERN_PACK_COMPILER.md
  - contract/v1/programs/program_PATTERN_PACK_BUNDLE_ASSEMBLER.md

  - contract/v1/programs/program_WORKFLOW_ORCHESTRATOR.md

  orchestration:
    - contract/v1/orchestration/state_model.yaml
    - contract/v1/orchestration/workflow_rules.yaml
    - contract/v1/orchestration/rerun_governance.yaml
    - contract/v1/orchestration/approval_gates.yaml
    - contract/v1/orchestration/artifact_trigger_map.yaml

  taxonomies:
    - contract/v1/taxonomies/coa_taxonomy.yaml
    - contract/v1/taxonomies/artifact_types.yaml

  rules:
    - contract/v1/rules/tagging_rules.yaml
    - contract/v1/rules/coa_mapping_rules.yaml

  schemas:
    - contract/v1/schemas/evidence_graph_schema.yaml
    - contract/v1/schemas/artifact_registry_schema.yaml

  tools:
    - contract/v1/tools/tool_registry.yaml
    - contract/v1/tools/tool_gateway_contract.yaml

  harness:
    - contract/v1/harness/replay_contract.yaml
    - contract/v1/harness/run_identity_contract.yaml
    - contract/v1/harness/output_fingerprint_contract.yaml

  governance:
    - contract/v1/governance/artifact_governance_model.md
    
build_requirements:

  enforce_manifest_hash: true
  enforce_contract_validation: true
  enforce_replay_equivalence: optional
  require_tool_gateway: true
  require_state_model: true
  require_workflow_orchestrator: true

runtime_expectations:

  deterministic_execution: true
  full_audit_traceability: true
  replay_safe_reruns: true
  governed_state_transitions: true