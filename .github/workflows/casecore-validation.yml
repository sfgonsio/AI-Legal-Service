name: CASECORE Validation

on:
  push:
    branches:
      - main
      - brain-v1
  pull_request:

jobs:
  validate-casecore:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install jsonschema
        run: python -m pip install --upgrade pip jsonschema

      - name: Run CASECORE validations
        shell: pwsh
        run: |
          & "casecore-spec\validators\run_all_validations.ps1"
