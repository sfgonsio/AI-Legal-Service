; Alembic configuration for the CaseCore backend.
; Migrations are co-located with the backend app per the decision in the core
; data implementation plan.
;
; Runtime uses an async engine (see database.py). Alembic itself runs
; synchronously — env.py derives a sync URL from DATABASE_URL (stripping any
; +aiosqlite / +asyncpg driver suffix).

[alembic]
script_location = alembic
prepend_sys_path = .
version_locations = alembic/versions
sqlalchemy.url = sqlite:///./casecore.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
